<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">JSOS visual identity concept</title>
  <desc id="desc">Dark spatial interface showing JSOS branding with a phone, glasses HUD, and watch.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071116"/>
      <stop offset="0.55" stop-color="#0a171d"/>
      <stop offset="1" stop-color="#061014"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ce7ff"/>
      <stop offset="1" stop-color="#18b7d4"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#18b7d4" stop-opacity=".28"/>
      <stop offset="1" stop-color="#18b7d4" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#78dff2" stroke-opacity=".055"/>
    </pattern>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="640" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="640" rx="28" fill="url(#grid)"/>
  <circle cx="1000" cy="210" r="360" fill="url(#glow)"/>
  <path d="M0 530C225 454 391 612 640 528S1063 430 1280 508V640H0Z" fill="#07161b" opacity=".9"/>

  <g transform="translate(72 78)">
    <rect width="168" height="34" rx="17" fill="#18b7d4" fill-opacity=".12" stroke="#18b7d4" stroke-opacity=".45"/>
    <circle cx="20" cy="17" r="5" fill="#62d894"/>
    <text x="34" y="22" fill="#a9efff" font-family="Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="1.3">DEVELOPMENT PREVIEW</text>
    <text x="0" y="146" fill="url(#cyan)" font-family="Arial, sans-serif" font-size="112" font-weight="800" letter-spacing="6">JSOS</text>
    <text x="4" y="197" fill="#e6f7fb" font-family="Arial, sans-serif" font-size="29" font-weight="650">Spatial control for OpenClaw</text>
    <text x="4" y="240" fill="#96adb6" font-family="Arial, sans-serif" font-size="21">Android Core · Rokid HUD · Wear OS</text>
    <line x1="4" y1="282" x2="456" y2="282" stroke="#18b7d4" stroke-opacity=".4"/>
    <text x="4" y="330" fill="#cceaf0" font-family="Arial, sans-serif" font-size="18">VOICE FIRST</text>
    <text x="178" y="330" fill="#cceaf0" font-family="Arial, sans-serif" font-size="18">SESSION AWARE</text>
    <text x="382" y="330" fill="#cceaf0" font-family="Arial, sans-serif" font-size="18">LOCAL</text>
  </g>

  <g transform="translate(710 86)">
    <rect x="128" y="18" width="224" height="450" rx="38" fill="#0c171c" stroke="#5fdcf4" stroke-opacity=".65" stroke-width="3"/>
    <rect x="143" y="52" width="194" height="384" rx="25" fill="#0a1115" stroke="#173b45"/>
    <rect x="204" y="34" width="72" height="7" rx="3.5" fill="#28434b"/>
    <text x="165" y="87" fill="#58d6ff" font-family="monospace" font-size="14" font-weight="700">JSOS CORE</text>
    <circle cx="311" cy="80" r="5" fill="#62d894"/>
    <rect x="160" y="108" width="160" height="66" rx="16" fill="#0e2026" stroke="#18b7d4" stroke-opacity=".32"/>
    <text x="178" y="133" fill="#7b949d" font-family="monospace" font-size="10">GATEWAY</text>
    <text x="178" y="157" fill="#62d894" font-family="monospace" font-size="15" font-weight="700">ONLINE</text>
    <rect x="160" y="188" width="160" height="66" rx="16" fill="#0e2026" stroke="#18b7d4" stroke-opacity=".32"/>
    <text x="178" y="213" fill="#7b949d" font-family="monospace" font-size="10">ROKID HUD</text>
    <text x="178" y="237" fill="#62d894" font-family="monospace" font-size="15" font-weight="700">PAIRED</text>
    <rect x="160" y="268" width="160" height="104" rx="16" fill="#0e2026" stroke="#18b7d4" stroke-opacity=".32"/>
    <text x="178" y="294" fill="#7b949d" font-family="monospace" font-size="10">ACTIVE SESSION</text>
    <text x="178" y="322" fill="#dff7fb" font-family="Arial, sans-serif" font-size="17" font-weight="700">OpenClaw · Main</text>
    <rect x="178" y="340" width="73" height="18" rx="9" fill="#18b7d4" fill-opacity=".16"/>
    <text x="191" y="353" fill="#58d6ff" font-family="monospace" font-size="9">VOICE READY</text>

    <g transform="translate(-6 108)" filter="url(#softGlow)">
      <path d="M0 104c28-39 71-62 126-62h60c48 0 82 16 107 45 25-29 59-45 107-45h58c55 0 98 23 126 62" fill="none" stroke="#65e8ff" stroke-width="7" stroke-linecap="round"/>
      <rect x="78" y="78" width="170" height="104" rx="34" fill="#071317" fill-opacity=".72" stroke="#6ce7ff" stroke-width="3"/>
      <rect x="336" y="78" width="170" height="104" rx="34" fill="#071317" fill-opacity=".72" stroke="#6ce7ff" stroke-width="3"/>
      <path d="M248 110c25-22 63-22 88 0" fill="none" stroke="#6ce7ff" stroke-width="4"/>
      <rect x="112" y="102" width="102" height="55" rx="8" fill="#071a12" stroke="#39ff88" stroke-opacity=".8"/>
      <text x="125" y="124" fill="#62d894" font-family="monospace" font-size="10">HUD READY</text>
      <text x="125" y="143" fill="#9bf5bd" font-family="monospace" font-size="9">VOICE · SESSION</text>
    </g>

    <g transform="translate(420 300)">
      <rect x="0" y="0" width="132" height="174" rx="42" fill="#0b1418" stroke="#5fdcf4" stroke-opacity=".65" stroke-width="3"/>
      <rect x="17" y="24" width="98" height="126" rx="28" fill="#0f2026" stroke="#18b7d4" stroke-opacity=".38"/>
      <text x="35" y="51" fill="#58d6ff" font-family="monospace" font-size="10">JSOS WATCH</text>
      <circle cx="39" cy="79" r="6" fill="#62d894"/>
      <text x="52" y="83" fill="#dff7fb" font-family="Arial, sans-serif" font-size="12" font-weight="700">CONNECTED</text>
      <rect x="31" y="103" width="70" height="24" rx="12" fill="#18b7d4" fill-opacity=".15" stroke="#18b7d4" stroke-opacity=".38"/>
      <text x="47" y="119" fill="#8ee9fa" font-family="monospace" font-size="10">TALK</text>
    </g>
  </g>

  <text x="72" y="596" fill="#6f8790" font-family="Arial, sans-serif" font-size="14">Visual identity concept · unified JSOS interface preview</text>
</svg>
